<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Rod Allen logo</title>
  <desc id="desc">A dark rounded square with large gold RA initials.</desc>
  <defs>
    <linearGradient id="gold" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe6a5" />
      <stop offset="0.52" stop-color="#d19a3a" />
      <stop offset="1" stop-color="#94651f" />
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="20%" r="82%">
      <stop offset="0" stop-color="#f9d88d" stop-opacity="0.34" />
      <stop offset="0.55" stop-color="#1f4a73" stop-opacity="0.15" />
      <stop offset="1" stop-color="#050a12" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#050a12" />
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#gold)" />
  <rect x="7" y="7" width="50" height="50" rx="12" fill="#07111f" />
  <rect x="7" y="7" width="50" height="50" rx="12" fill="url(#glow)" />
  <text x="32" y="40" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900" letter-spacing="-1.7" fill="#ffe6a5">RA</text>
  <path d="M17 47h30" stroke="#d19a3a" stroke-width="2.5" stroke-linecap="round" opacity="0.82" />
