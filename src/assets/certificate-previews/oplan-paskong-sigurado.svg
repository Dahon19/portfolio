<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Oplan Paskong Sigurado sanitized certificate preview</title>
  <desc id="desc">Sanitized preview with private identifiers and verification details removed.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c5a668"/>
      <stop offset="1" stop-color="#315dff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="600" rx="42" fill="#071424"/>
  <rect x="34" y="34" width="892" height="532" rx="32" fill="url(#paper)"/>
  <rect x="70" y="70" width="820" height="460" rx="24" fill="none" stroke="url(#accent)" stroke-width="6"/>
  <text x="480" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="46" font-weight="700" fill="#0b1628">Certificate Preview</text>
  <text x="480" y="215" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" letter-spacing="5" fill="#9a742d">SANITIZED WEBINAR RECORD</text>
  <text x="480" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#15253f">Oplan Paskong Sigurado</text>
  <text x="480" y="363" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" fill="#2f405f">Rod Allen B. Agregado</text>
  <text x="480" y="417" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#526276">May 29, 2026</text>
  <rect x="340" y="458" width="280" height="40" rx="20" fill="#eaf0f8"/>
  <text x="480" y="484" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#315dff">Private verification details hidden</text>
</svg>
