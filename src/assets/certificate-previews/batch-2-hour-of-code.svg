<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Batch 2 Hour of Code sanitized certificate preview</title>
  <desc id="desc">Sanitized preview with QR code, certificate number, and signature details removed.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c5a668"/>
      <stop offset="1" stop-color="#315dff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="600" rx="42" fill="#071424"/>
  <rect x="34" y="34" width="892" height="532" rx="32" fill="url(#paper)"/>
  <rect x="70" y="70" width="820" height="460" rx="24" fill="none" stroke="url(#accent)" stroke-width="6"/>
  <text x="480" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#0b1628">Certificate of Participation</text>
  <text x="480" y="205" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" letter-spacing="5" fill="#9a742d">SANITIZED WEBINAR RECORD</text>
  <text x="480" y="288" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#15253f">Batch 2 of Hour of Code</text>
  <text x="480" y="334" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#15253f">Learn AI &amp; Coding the Fun Way!</text>
  <text x="480" y="390" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="23" fill="#2f405f">DICT MIMAROPA</text>
  <text x="480" y="435" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#526276">November 22, 2025</text>
  <rect x="300" y="468" width="360" height="40" rx="20" fill="#eaf0f8"/>
  <text x="480" y="494" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#315dff">QR code and certificate number hidden</text>
</svg>
